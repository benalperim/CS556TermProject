name: CI + Dependency Security

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC

# Opt into Node.js 24 for JavaScriptbased GitHub Actions prevents the Node 20 deprecation warnings from becoming issues later)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  dependency-security:
    runs-on: ubuntu-latest
    needs: ci
    steps:
        #ty github updates for making my life harder
      - uses: actions/checkout@v5

        #ty github updates for making my life harder
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci
        #pls work 
      - name: snyk test
        run: snyk test || true

      - name: npm audit (JSON)
        run: npm audit --json > audit.json || true

      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json || true

      # ✅ Upload artifacts BEFORE enforcing the fail-policy, and always upload even if something fails love to see it
      - name: Upload security artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-artifacts
          path: |
            audit.json
            sbom.json

      # This will likely fail for nodejs-goof (expected), but you still get artifacts now.
      - name: Enforce security policy (fail on high/critical)
        run: python3 scripts/risk_score.py audit.json

  automerge-dependabot:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [ci, dependency-security]
    steps:
      - name: Enable auto-merge (Dependabot PRs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"